<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKRPRO ULTIMATE PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --bg-body: #050505;
            --card-bg: #111114;
            --input-bg: #000000;
            --text-main: #ffffff;
            --text-dim: #777777;
            --border: #222222;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: var(--bg-body);
            margin: 0;
            padding: 25px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .iphone-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 38px;
            padding: 30px 22px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .banner-text {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        /* Label Style: Bold, Sano, Capital */
        .section-label {
            font-size: 11px;
            font-weight: 900;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: block;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            outline: none;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .uid-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button.action-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: 0.3s;
        }

        button.action-btn:active { transform: scale(0.96); }
        .btn-danger { background: #ff4757 !important; }
        .btn-join { background: #2e86de !important; }

        .emote-box {
            max-height: 160px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            background: var(--input-bg);
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .e-item {
            font-size: 9px;
            padding: 11px 4px;
            background: var(--card-bg);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-dim);
            font-weight: 800;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .e-item.active {
            background: var(--primary);
            color: white;
            border-color: transparent;
        }

        .dev-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        .dev-footer span { color: var(--primary); }
    </style>
</head>
<body>

    <div class="iphone-card">
        <div class="header">
            <div class="banner-text">FF BOT WEBSITE AND EMOTE WEB</div>
        </div>

        <div class="section">
            <span class="section-label">Auto Invite</span>
            <input type="number" id="g_uid" placeholder="TARGET UID">
            <button class="action-btn" id="btn-5" onclick="callApi('5', 'uid=' + document.getElementById('g_uid').value, 'btn-5')">SEND 5 INVITES</button>
        </div>

        <div class="section">
            <span class="section-label">Server Stress</span>
            <input type="number" id="l_tc" placeholder="TEAM CODE">
            <button class="action-btn btn-danger" id="btn-lag" onclick="callApi('lag', 'tc=' + document.getElementById('l_tc').value, 'btn-lag')">START LAG ATTACK</button>
        </div>

        <div class="section">
            <span class="section-label">Advanced Join</span>
            <input type="number" id="tc" placeholder="TEAM CODE" style="margin-bottom:12px">
            
            <div class="uid-grid">
                <input type="number" id="u1" placeholder="UID 1">
                <input type="number" id="u2" placeholder="UID 2">
                <input type="number" id="u3" placeholder="UID 3">
                <input type="number" id="u4" placeholder="UID 4">
            </div>

            <span class="section-label" style="margin-top:20px">Choose Animation</span>
            <div class="emote-box" id="eContainer"></div>
            
            <span class="section-label">Selected Emote ID</span>
            <input type="number" id="eid" placeholder="EMOTE ID">

            <button class="action-btn btn-join" id="btn-join" onclick="sendEmoteFull()">EXECUTE JOINS</button>
        </div>

        <div class="dev-footer">
            DEVELOPER : <span>CKRPRO</span>
        </div>
    </div>

<script>
    const API_BASE = "https://emote-api-1-4rbj.onrender.com";

    const emotesData = {
        "p90": "909049010", "m60": "909051003", "mp5": "909033002", "groza": "909041005", "thompson": "909038010",
        "m10 red": "909039011", "mp40 blue": "909040010", "m10 green": "909000081", "xm8": "909000085", "ak": "909000063",
        "mp40": "909000075", "m4a1": "909033001", "famas": "909000090", "scar": "909000068", "ump": "909000098",
        "m1887": "909035007", "fist": "909037011", "g18": "909038012", "an94": "909035012", "woodpecker": "909042008",
        "money": "909000055", "heart": "909000045", "rose": "909000010", "throne": "909000014", "pirate": "909000034",
        "car": "909000039", "lol": "909000002", "cobra": "909000072", "ghost": "909036001", "sholay": "909050020",
        "blade": "909050013", "hi": "909000001", "dab": "909000005", "chicken": "909000006", "dance": "909000008",
        "babyshark": "909000009", "pushup": "909000012", "dragon": "909000015", "selfie": "909000032", "breakdance": "909000040",
        "thor": "909050008", "rasengan": "909047015", "ninja": "909047018", "fireball": "909050005", "lvl100": "909042007",
        "twerk": "909034009", "sitdown": "909033005", "booyah": "909033006", "valentine": "909038004", "mummy": "909000011",
        "shuffling": "909000013", "teatime": "909000046", "doggie": "909000052", "hadouken": "909000089", "provoke": "909000003",
        "applause": "909000004", "puffyride": "909051014", "petals": "909051013", "bow": "909051012", "moonwalk": "909045009",
        "moneyrain": "909042002", "toiletman": "909042013", "kemusan": "909042018", "spidersense": "909040009", "nosweat": "909046008"
    };

    const container = document.getElementById('eContainer');
    Object.keys(emotesData).sort().forEach(name => {
        let div = document.createElement('div');
        div.className = 'e-item';
        div.innerText = name;
        div.onclick = () => {
            document.getElementById('eid').value = emotesData[name];
            document.querySelectorAll('.e-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
        };
        container.appendChild(div);
    });

    async function callApi(end, params, btnId) {
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        btn.innerText = "WAITING...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE}/${end}?${params}`);
            btn.innerText = res.ok ? "SUCCESS ✅" : "ERROR ❌";
        } catch (e) {
            btn.innerText = "OFFLINE ❌";
        }

        setTimeout(() => {
            btn.innerText = originalText;
            btn.disabled = false;
        }, 2000);
    }

    function sendEmoteFull() {
        const tc = document.getElementById('tc').value;
        const eid = document.getElementById('eid').value;
        const u1 = document.getElementById('u1').value;
        const u2 = document.getElementById('u2').value;
        const u3 = document.getElementById('u3').value;
        const u4 = document.getElementById('u4').value;
        if(!tc || !eid || !u1) return alert("Fill data!");
        let query = new URLSearchParams({ tc, emote_id: eid, uid1: u1 });
        if(u2) query.append('uid2', u2);
        if(u3) query.append('uid3', u3);
        if(u4) query.append('uid4', u4);
        callApi('join', query.toString(), 'btn-join');
    }
</script>

</body>
</html>
